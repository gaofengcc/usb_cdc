[proxy]
real_port = COM3
virtual_port = COM10
baudrate = 115200
data_bits = 8
parity = N
stop_bits = 1
timeout_s = 0.01
flow_control = none

[recording]
output_dir = tools/com_proxy/templates
auto_save_on_idle = true
idle_timeout_s = 5.0
max_session_minutes = 30
record_rts_dtr = true
ack_timeout_ms = 50
signal_poll_interval_s = 0.001
read_chunk_size = 1024
